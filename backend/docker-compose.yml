version: '3.8'

services:
  app:
    build: .
    container_name: youapp-api
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/youapp
      - JWT_SECRET=youapp-secret-key-2024
      - JWT_EXPIRATION=7d
      - RABBITMQ_URI=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - rabbitmq
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: youapp-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: youapp-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: unless-stopped

volumes:
  mongo_data:
